services:
  - type: web
    name: baby-keys-playground
    runtime: static
    buildCommand: bun install && bun run build
    staticPublishPath: ./dist/client
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
